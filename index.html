<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>자캐 아카이브</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

:root{
  --bg1:#edf6ea;
  --bg2:#dfeedd;
  --bg3:#edf7f0;
  --dot1:#dfeadd;
  --dot2:#f7fbf6;
  --main:#8fae8c;
  --soft:#dbe9d7;
  --box:#f8fbf7;
  --text:#3f4f44;
  --line:#c9dcc5;
}

body{
  margin:0;
  padding:24px;
  color:var(--text);
  font-family:'Gowun Dodum',sans-serif;
  background:
    radial-gradient(circle at 18px 18px,var(--dot1) 2px,transparent 3px),
    radial-gradient(circle at 58px 58px,var(--dot2) 3px,transparent 4px),
    linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  background-size:76px 76px,76px 76px,100% 100%;
  background-attachment:fixed;
}

a{text-decoration:none;color:inherit}

button,input,select{
  font-family:'Gowun Dodum',sans-serif;
  font-size:16px;
}

button{
  border:none;
  cursor:pointer;
  background:transparent;
  color:var(--text);
}

.wrap{max-width:1120px;margin:auto}

.title{
  text-align:center;
  font-family:'Gaegu',cursive;
  font-size:44px;
  font-weight:700;
  margin:56px 0 10px;
}

.notice{
  text-align:center;
  font-size:14px;
  color:#6f8074;
  margin-bottom:14px;
}

.top{
  position:fixed;
  top:16px;
  right:16px;
  z-index:100;
  display:flex;
  gap:8px;
}

.icon{
  width:46px;
  height:46px;
  border:2px solid var(--main);
  border-radius:50%;
  background:#ffffff99;
  color:var(--text);
  font-size:20px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.icon:hover{background:#ffffffdd}

.icon::after{
  content:attr(data-tip);
  position:absolute;
  right:54px;
  top:50%;
  transform:translateY(-50%);
  background:#fff;
  padding:6px 10px;
  border-radius:12px;
  font-size:13px;
  white-space:nowrap;
  opacity:0;
  pointer-events:none;
  box-shadow:0 4px 12px #0001;
}

.icon:hover::after{opacity:1}

.admin{display:none}
body.edit .admin{display:inline-flex}
body.edit #loginBtn{display:none}
body.viewonly #loginBtn,
body.viewonly .admin{display:none!important}

.cat-bar{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  margin:18px 0;
}

.cat{
  padding:8px 16px;
  border-radius:999px;
  background:var(--soft);
}

.cat.active{
  background:var(--main);
  color:#fff;
}

.cat[draggable="true"]{cursor:grab}

.center-btns{text-align:center;margin-bottom:14px}

.soft-btn{
  background:var(--box);
  border:1px solid var(--line);
  border-radius:999px;
  padding:10px 16px;
  margin:5px;
}

.soft-btn:hover{background:var(--soft)}

.box{
  display:none;
  background:#ffffffcc;
  border:1px solid var(--line);
  border-radius:28px;
  padding:18px;
  margin-bottom:16px;
  text-align:center;
  box-shadow:0 8px 18px #0001;
}

.box input,.box select{
  border:none;
  background:#fff;
  border-radius:16px;
  padding:12px;
  margin:6px;
  width:220px;
  box-shadow:inset 0 0 0 1px var(--line);
}

.color-row{display:inline-block}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:18px;
}

.card-wrap[draggable="true"]{cursor:grab}

.card{
  position:relative;
  border-radius:30px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 8px 18px #0002;
  transition:.2s;
}

.card:hover{transform:translateY(-4px)}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  padding:12px;
  display:block;
}

.text{
  text-align:center;
  background:#ffffffcc;
  padding:10px;
  font-family:'Gaegu',cursive;
  font-size:28px;
  font-weight:700;
}

.mini{
  font-family:'Gowun Dodum',sans-serif;
  font-size:15px;
  color:#5f6f63;
  font-weight:400;
  margin-top:3px;
}

.sub{
  font-family:'Gowun Dodum',sans-serif;
  font-size:14px;
  color:#6f8074;
  font-weight:400;
  margin-top:3px;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(60,80,60,.72);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:16px;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}

.card:hover .overlay{opacity:1}

.menu-btn{
  position:absolute;
  top:10px;
  right:10px;
  z-index:10;
}

.menu{
  display:none;
  position:absolute;
  top:58px;
  right:10px;
  z-index:11;
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 5px 14px #0002;
}

.menu button{
  display:block;
  width:90px;
  padding:10px;
}

.menu button:hover{background:var(--soft)}

.float{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:100;
  display:flex;
  flex-direction:column;
  gap:9px;
}

.popup-bg{
  display:none;
  position:fixed;
  inset:0;
  background:#0007;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup{
  width:320px;
  background:var(--box);
  border-radius:30px;
  padding:24px;
  text-align:center;
  box-shadow:0 8px 20px #0003;
}

.popup-title{
  font-family:'Gaegu',cursive;
  font-size:28px;
  font-weight:700;
  margin-bottom:12px;
  white-space:pre-line;
}

.popup input{
  width:90%;
  border:none;
  border-radius:16px;
  padding:12px;
  background:#fff;
  box-shadow:inset 0 0 0 1px var(--line);
}

.popup button{
  background:var(--soft);
  border-radius:14px;
  padding:10px 14px;
  margin:12px 4px 0;
}

@media(min-width:900px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
}

@media(max-width:699px){
  body{padding:14px}
  .title{font-size:34px;margin-top:58px}
  .grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .card{border-radius:22px}
  .text{font-size:21px;padding:8px}
  .mini{font-size:12px}
  .sub{font-size:12px}
  .box input,.box select{width:92%}
  .icon{width:43px;height:43px}
  .float{right:12px;bottom:12px}
}
</style>
</head>

<body>

<div class="top">
  <button id="loginBtn" class="icon" data-tip="관리자 모드" onclick="login()">☰</button>
  <button class="icon admin" data-tip="스킨 설정" onclick="toggle(skinBox)">✿</button>
  <button class="icon admin" data-tip="관리자 모드 끄기" onclick="logout()">×</button>
</div>

<div class="wrap">
  <h1 class="title" id="title">아카이브</h1>
  <div class="notice" id="notice"></div>

  <div class="cat-bar" id="catBar"></div>

  <div class="center-btns">
    <button class="soft-btn admin" onclick="toggle(catBox)">+ 카테고리</button>
    <button class="soft-btn admin" onclick="toggle(cardBox)">+ 카드</button>
    <button class="soft-btn admin" onclick="changePw()">비밀번호 변경</button>
    <button class="soft-btn admin" onclick="copyOwnerLink()">내 링크 복사</button>
    <button class="soft-btn admin" onclick="copyShareLink()">공유 링크 복사</button>
  </div>

  <div class="box" id="skinBox">
    <select id="skinType" onchange="updateSkinUI()">
      <option value="preset">기본 스킨</option>
      <option value="solid">단색</option>
      <option value="gradient">사용자 지정 그라데이션</option>
    </select>

    <select id="themeSelect">
      <option value="green">연두</option>
      <option value="pink">핑크</option>
      <option value="blue">하늘</option>
      <option value="purple">보라</option>
    </select>

    <span id="skinColor1">색1 <input type="color" id="themeC1" value="#edf6ea"></span>
    <span id="skinColor2">색2 <input type="color" id="themeC2" value="#dfeedd"></span>
    <span id="skinColor3">색3 <input type="color" id="themeC3" value="#edf7f0"></span>

    <button class="soft-btn" onclick="saveSkin()">적용</button>
  </div>

  <div class="box" id="catBox">
    <input id="newCat" placeholder="카테고리 이름">
    <button class="soft-btn" onclick="addCat()">추가</button>
    <div style="font-size:13px;color:#7b8b7d;margin-top:6px;">
      관리자 모드에서 카테고리 버튼을 드래그하면 정렬됩니다. 우클릭하면 삭제됩니다.
    </div>
  </div>

  <div class="box" id="cardBox">
    <input id="nameInput" placeholder="이름">
    <input id="miniInput" placeholder="한줄 소개">
    <input id="imgInput" placeholder="이미지 URL">
    <input type="file" id="fileInput">
    <input id="linkInput" placeholder="링크">
    <input id="descInput" placeholder="마우스 올렸을 때 설명">

    <select id="catSelect"></select>

    <select id="styleSelect" onchange="updateColorUI()">
      <option value="auto">자동색</option>
      <option value="basic">기본</option>
      <option value="grad2">그라데이션</option>
      <option value="grad3">3색 그라데이션</option>
      <option value="grad4">4색 그라데이션</option>
    </select>

    <div id="colorBox">
      <span id="c1row" class="color-row">색1 <input type="color" id="c1" value="#f4a7c0"></span>
      <span id="c2row" class="color-row">색2 <input type="color" id="c2" value="#bfe3b4"></span>
      <span id="c3row" class="color-row">색3 <input type="color" id="c3" value="#e8d9a4"></span>
      <span id="c4row" class="color-row">색4 <input type="color" id="c4" value="#a4c7e8"></span>
    </div>

    <button id="saveBtn" class="soft-btn" onclick="saveCard()">생성</button>
    <div style="font-size:13px;color:#7b8b7d;">
      관리자 모드에서 카드를 드래그하면 정렬됩니다.
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="float">
  <button class="icon" data-tip="검색" onclick="searchCard()">⌕</button>
  <button class="icon admin" data-tip="백업" onclick="backup()">□</button>
  <button class="icon admin" data-tip="불러오기" onclick="loadData()">⇧</button>
  <button class="icon admin" data-tip="초기화" onclick="resetAll()">↺</button>
</div>

<div class="popup-bg" id="popupBg">
  <div class="popup">
    <div class="popup-title" id="popupText"></div>
    <input id="popupInput">
    <div>
      <button onclick="popupOk()">확인</button>
      <button onclick="popupCancel()">취소</button>
    </div>
  </div>
</div>

<script>
let params=new URLSearchParams(location.search);
let user=params.get("user");
let isViewOnly=params.get("view")==="1";
let popupCallback=null;

function makeID(){
  return Math.random().toString(36).substring(2,10)+Date.now().toString(36).slice(-4);
}

function openPopup(text,cb,type="text"){
  popupText.innerText=text;
  popupInput.value="";
  popupInput.type=type;
  popupBg.style.display="flex";
  popupCallback=cb;
  setTimeout(()=>popupInput.focus(),50);
}

function popupOk(){
  popupBg.style.display="none";
  if(popupCallback)popupCallback(popupInput.value);
}

function popupCancel(){
  popupBg.style.display="none";
}

if(!user){
  setTimeout(()=>{
    openPopup("닉네임 입력\n\n링크를 꼭 저장하거나 백업해 주세요.",(nickname)=>{
      if(!nickname || nickname.trim()==="") nickname="나";
      user=makeID();
      localStorage.setItem("nickname_"+user,nickname.trim());
      location.href=location.pathname+"?user="+encodeURIComponent(user);
    });
  },100);
}

if(isViewOnly){
  document.body.classList.add("viewonly");
}

const key="cards_"+user;
const catKey="cats_"+user;
const pwKey="pw_"+user;
const themeKey="theme_"+user;

let cards=JSON.parse(localStorage.getItem(key)||"[]");
let cats=JSON.parse(localStorage.getItem(catKey)||"[]");
let password=localStorage.getItem(pwKey)||"1234";
let nickname=localStorage.getItem("nickname_"+user)||"";
let current="all";
let editIndex=null;
let dragCardIndex=null;
let dragCatIndex=null;

function save(){
  localStorage.setItem(key,JSON.stringify(cards));
  localStorage.setItem(catKey,JSON.stringify(cats));
  localStorage.setItem(pwKey,password);
}

function login(){
  if(isViewOnly)return;
  openPopup("비밀번호 입력",(v)=>{
    if(v===password)document.body.classList.add("edit");
    else alert("비밀번호가 틀렸습니다.");
  },"password");
}

function logout(){
  document.body.classList.remove("edit");
  catBox.style.display="none";
  cardBox.style.display="none";
  skinBox.style.display="none";
  closeMenus();
}

function changePw(){
  openPopup("기존 비밀번호",(old)=>{
    if(old!==password){alert("기존 비밀번호가 틀렸습니다.");return;}
    openPopup("새 비밀번호",(nw)=>{
      if(!nw){alert("새 비밀번호를 입력해 주세요.");return;}
      openPopup("새 비밀번호 확인",(ck)=>{
        if(nw!==ck){alert("비밀번호가 일치하지 않습니다.");return;}
        password=nw;
        save();
        alert("비밀번호가 변경되었습니다.");
      },"password");
    },"password");
  },"password");
}

function toggle(el){
  if(!document.body.classList.contains("edit"))return;
  el.style.display=el.style.display==="block"?"none":"block";
}

function renderCat(){
  catBar.innerHTML="";
  catSelect.innerHTML="";

  let all=document.createElement("button");
  all.innerText="전체";
  all.className="cat"+(current==="all"?" active":"");
  all.onclick=()=>{current="all";renderCat();render();};
  catBar.appendChild(all);

  cats.forEach((c,i)=>{
    let b=document.createElement("button");
    b.innerText=c;
    b.className="cat"+(current===c?" active":"");
    b.draggable=document.body.classList.contains("edit");
    b.onclick=()=>{current=c;renderCat();render();};

    b.oncontextmenu=e=>{
      e.preventDefault();
      if(!document.body.classList.contains("edit"))return;
      if(confirm("정말 이 카테고리를 삭제하시겠습니까?")){
        cats=cats.filter(x=>x!==c);
        cards.forEach(card=>{if(card.cat===c)card.cat=""});
        save();renderCat();render();
      }
    };

    b.ondragstart=()=>{dragCatIndex=i};
    b.ondragover=e=>e.preventDefault();
    b.ondrop=e=>{
      e.preventDefault();
      if(!document.body.classList.contains("edit"))return;
      let moved=cats.splice(dragCatIndex,1)[0];
      cats.splice(i,0,moved);
      save();renderCat();
    };

    catBar.appendChild(b);

    let op=document.createElement("option");
    op.value=c;
    op.innerText=c;
    catSelect.appendChild(op);
  });
}

function addCat(){
  if(!document.body.classList.contains("edit"))return;
  let v=newCat.value.trim();
  if(!v)return;
  if(!cats.includes(v))cats.push(v);
  newCat.value="";
  save();
  renderCat();
}

function updateColorUI(){
  let style=styleSelect.value;
  ["c1row","c2row","c3row","c4row"].forEach(id=>document.getElementById(id).style.display="inline-block");

  if(style==="auto"){
    ["c1row","c2row","c3row","c4row"].forEach(id=>document.getElementById(id).style.display="none");
  }
  if(style==="basic"){
    ["c2row","c3row","c4row"].forEach(id=>document.getElementById(id).style.display="none");
  }
  if(style==="grad2"){
    ["c3row","c4row"].forEach(id=>document.getElementById(id).style.display="none");
  }
  if(style==="grad3"){
    c4row.style.display="none";
  }
}

function getBg(card){
  let style=card.style||"auto";
  let c=card.colors||[];

  if(style==="basic")return c[0]||"#f8fbf7";
  if(style==="grad2")return `linear-gradient(135deg,${c[0]||"#f4a7c0"},${c[1]||"#bfe3b4"})`;
  if(style==="grad3")return `linear-gradient(135deg,${c[0]||"#f4a7c0"},${c[1]||"#bfe3b4"},${c[2]||"#e8d9a4"})`;
  if(style==="grad4")return `linear-gradient(135deg,${c[0]||"#f4a7c0"},${c[1]||"#bfe3b4"},${c[2]||"#e8d9a4"},${c[3]||"#a4c7e8"})`;

  return "linear-gradient(135deg,#f8fbf7,#dbe9d7)";
}

function saveCard(){
  if(!document.body.classList.contains("edit"))return;

  let fileObj=fileInput.files[0];

  if(fileObj){
    let reader=new FileReader();
    reader.onload=e=>pushCard(e.target.result);
    reader.readAsDataURL(fileObj);
  }else{
    pushCard(imgInput.value);
  }
}

function pushCard(src){
  let style=styleSelect.value;
  let colors=[c1.value,c2.value,c3.value,c4.value];

  if(style==="auto")colors=[];
  if(style==="basic")colors=colors.slice(0,1);
  if(style==="grad2")colors=colors.slice(0,2);
  if(style==="grad3")colors=colors.slice(0,3);
  if(style==="grad4")colors=colors.slice(0,4);

  let obj={
    name:nameInput.value.trim()||"이름 없음",
    mini:miniInput.value.trim()||"",
    img:src||"",
    link:linkInput.value||"#",
    desc:descInput.value||"",
    cat:catSelect.value||"",
    style:style,
    colors:colors,
    order:editIndex===null?Date.now():cards[editIndex].order
  };

  if(editIndex===null)cards.unshift(obj);
  else{
    cards[editIndex]=obj;
    editIndex=null;
    saveBtn.innerText="생성";
  }

  clearForm();
  save();
  renderCat();
  render();
}

function clearForm(){
  nameInput.value="";
  miniInput.value="";
  imgInput.value="";
  linkInput.value="";
  descInput.value="";
  fileInput.value="";
  styleSelect.value="auto";
  updateColorUI();
}

function render(list=cards){
  grid.innerHTML="";

  list.forEach(c=>{
    if(current!=="all"&&c.cat!==current)return;

    let realIndex=cards.indexOf(c);
    let wrap=document.createElement("div");
    wrap.className="card-wrap";
    wrap.draggable=document.body.classList.contains("edit");

    wrap.ondragstart=()=>{dragCardIndex=realIndex};
    wrap.ondragover=e=>e.preventDefault();
    wrap.ondrop=e=>{
      e.preventDefault();
      if(!document.body.classList.contains("edit"))return;
      let moved=cards.splice(dragCardIndex,1)[0];
      cards.splice(realIndex,0,moved);
      save();render();
    };

    wrap.innerHTML=`
      <div class="card" style="background:${getBg(c)}">
        <a href="${c.link||"#"}">
          <img src="${c.img||""}">
          <div class="overlay">${c.desc||""}</div>
          <div class="text">
            ${c.name||"이름 없음"}
            <div class="mini">${c.mini||""}</div>
            <div class="sub">${c.cat||"카테고리 없음"}</div>
          </div>
        </a>
        <button class="menu-btn icon admin" data-tip="메뉴" onclick="menu(event,${realIndex})">⋯</button>
        <div class="menu" id="m${realIndex}">
          <button onclick="editCard(event,${realIndex})">수정</button>
          <button onclick="del(event,${realIndex})">삭제</button>
        </div>
      </div>
    `;

    grid.appendChild(wrap);
  });
}

function editCard(e,i){
  e.preventDefault();
  e.stopPropagation();
  if(!document.body.classList.contains("edit"))return;

  let c=cards[i];
  editIndex=i;

  cardBox.style.display="block";
  nameInput.value=c.name||"";
  miniInput.value=c.mini||"";
  imgInput.value=c.img||"";
  linkInput.value=c.link||"";
  descInput.value=c.desc||"";
  catSelect.value=c.cat||"";
  styleSelect.value=c.style||"auto";

  let colors=c.colors||[];
  c1.value=colors[0]||"#f4a7c0";
  c2.value=colors[1]||"#bfe3b4";
  c3.value=colors[2]||"#e8d9a4";
  c4.value=colors[3]||"#a4c7e8";

  updateColorUI();
  saveBtn.innerText="수정";
  closeMenus();
}

function del(e,i){
  e.preventDefault();
  e.stopPropagation();
  if(!document.body.classList.contains("edit"))return;

  if(confirm("정말 삭제할까요?")){
    cards.splice(i,1);
    save();
    render();
  }
}

function menu(e,i){
  e.preventDefault();
  e.stopPropagation();
  if(!document.body.classList.contains("edit"))return;

  closeMenus();
  let m=document.getElementById("m"+i);
  if(m)m.style.display="block";
}

function closeMenus(){
  document.querySelectorAll(".menu").forEach(m=>m.style.display="none");
}

function searchCard(){
  openPopup("검색어 입력",(w)=>{
    if(!w){render();return;}
    render(cards.filter(c=>((c.name||"")+(c.mini||"")+(c.desc||"")+(c.cat||"")).includes(w)));
  });
}

function backup(){
  if(!document.body.classList.contains("edit"))return;

  let data=JSON.stringify({cards,cats,password,nickname});
  navigator.clipboard.writeText(data).then(()=>alert("백업 데이터가 복사되었습니다."));
}

function loadData(){
  if(!document.body.classList.contains("edit"))return;

  openPopup("백업 데이터 붙여넣기",(txt)=>{
    try{
      let d=JSON.parse(txt);
      cards=d.cards||[];
      cats=d.cats||[];
      password=d.password||password;
      nickname=d.nickname||nickname;
      localStorage.setItem("nickname_"+user,nickname);
      save();
      renderTitle();
      renderCat();
      render();
      alert("불러오기 완료");
    }catch(e){
      alert("데이터 형식이 이상합니다.");
    }
  });
}

function resetAll(){
  if(!document.body.classList.contains("edit"))return;

  if(confirm("정말 완전 초기화할까요?")){
    localStorage.removeItem(key);
    localStorage.removeItem(catKey);
    localStorage.removeItem(pwKey);
    localStorage.removeItem("nickname_"+user);
    localStorage.removeItem(themeKey);
    location.reload();
  }
}

function updateSkinUI(){
  let type=skinType.value;
  themeSelect.style.display= type==="preset" ? "inline-block" : "none";
  skinColor1.style.display= type==="preset" ? "none" : "inline-block";
  skinColor2.style.display= type==="gradient" ? "inline-block" : "none";
  skinColor3.style.display= type==="gradient" ? "inline-block" : "none";
}

function saveSkin(){
  let data={
    type:skinType.value,
    preset:themeSelect.value,
    c1:themeC1.value,
    c2:themeC2.value,
    c3:themeC3.value
  };
  localStorage.setItem(themeKey,JSON.stringify(data));
  applySkin(data);
}

function applySkin(data){
  if(!data)data={type:"preset",preset:"green"};

  let root=document.documentElement;

  let set=(bg1,bg2,bg3,dot1,dot2,main,soft,box,line)=>{
    root.style.setProperty("--bg1",bg1);
    root.style.setProperty("--bg2",bg2);
    root.style.setProperty("--bg3",bg3);
    root.style.setProperty("--dot1",dot1);
    root.style.setProperty("--dot2",dot2);
    root.style.setProperty("--main",main);
    root.style.setProperty("--soft",soft);
    root.style.setProperty("--box",box);
    root.style.setProperty("--line",line);
  };

  if(data.type==="solid"){
    set(data.c1,data.c1,data.c1,data.c1,"#ffffff",data.c1,data.c1,"#ffffff",data.c1);
  }
  else if(data.type==="gradient"){
    set(data.c1,data.c2,data.c3,data.c2,"#ffffff",data.c2,data.c1,"#ffffff",data.c2);
  }
  else{
    if(data.preset==="pink")set("#fff1f5","#ffe4ec","#fff7fa","#ffdbe7","#fff6fa","#e7a3b8","#f4d5dd","#fff8fb","#e8c4cf");
    else if(data.preset==="blue")set("#eef7ff","#ddefff","#f6fbff","#d9ecff","#f6fbff","#8baecd","#d9eafd","#f8fcff","#c6dcef");
    else if(data.preset==="purple")set("#f5efff","#ece4ff","#faf7ff","#e7ddff","#faf7ff","#a899c9","#e1d8f5","#fbf8ff","#d6cbe8");
    else set("#edf6ea","#dfeedd","#edf7f0","#dfeadd","#f7fbf6","#8fae8c","#dbe9d7","#f8fbf7","#c9dcc5");
  }
}

function copyOwnerLink(){
  let url=location.origin+location.pathname+"?user="+encodeURIComponent(user);
  navigator.clipboard.writeText(url).then(()=>alert("내 링크가 복사되었습니다."));
}

function copyShareLink(){
  let url=location.origin+location.pathname+"?user="+encodeURIComponent(user)+"&view=1";
  navigator.clipboard.writeText(url).then(()=>alert("보기 전용 공유 링크가 복사되었습니다."));
}

function renderTitle(){
  title.innerText=(nickname||"나")+"의 아카이브";
  notice.innerText=isViewOnly ? "보기 전용 페이지입니다." : "내 링크를 꼭 저장해 주세요. 공유할 때는 보기 전용 링크를 사용해 주세요.";
}

document.addEventListener("click",e=>{
  if(!e.target.closest(".menu")&&!e.target.closest(".menu-btn"))closeMenus();
});

updateColorUI();
updateSkinUI();

let savedSkin=localStorage.getItem(themeKey);
applySkin(savedSkin?JSON.parse(savedSkin):{type:"preset",preset:"green"});

renderTitle();
renderCat();
render();
</script>

</body>
</html>
