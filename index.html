<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>자캐 정리</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:
    radial-gradient(circle at 20% 20%, #f8fbf7 0 8px, transparent 9px),
    radial-gradient(circle at 80% 30%, #e1eddd 0 7px, transparent 8px),
    #eef4ed;
  font-family:'Gaegu', cursive;
  font-size:21px;
  color:#3f4f44;
  padding:24px;
}
a{text-decoration:none;color:inherit}
button,input,select,textarea{
  font-family:'Gaegu';
  font-size:18px;
  border:none;
  border-radius:999px;
  padding:10px 14px;
  margin:5px;
}
button{
  background:#dbe9d7;
  cursor:pointer;
}
button:hover{background:#c9dfc3}
.wrap{max-width:1100px;margin:auto}

.top{
  position:fixed;
  top:16px;
  right:16px;
  z-index:100;
}
.icon{
  width:48px;
  height:48px;
  border-radius:50%;
  box-shadow:0 4px 12px #0002;
}
.admin{display:none}
body.edit .admin{display:inline-block}
body.edit #loginBtn{display:none}

.cat-bar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
  margin:54px 0 18px;
}
.cat{
  background:#dbe9d7;
  border-radius:999px;
}
.cat.active{
  background:#8fae8c;
  color:white;
}

.box{
  display:none;
  background:#f8fbf7dd;
  padding:16px;
  margin:14px 0;
  border-radius:28px;
  box-shadow:0 6px 16px #0001;
  text-align:center;
}
.box input,.box select{
  background:white;
  box-shadow:inset 0 0 0 1px #d6e2d3;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:20px;
}
.card{
  position:relative;
  border-radius:30px;
  overflow:hidden;
  background:white;
  box-shadow:0 8px 18px #0002;
  transition:.22s;
}
.card:hover{transform:translateY(-4px)}
.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  display:block;
  padding:12px;
  box-sizing:border-box;
}
.text{
  text-align:center;
  background:#ffffffcc;
  padding:10px;
  font-size:24px;
}
.sub{
  font-size:15px;
  color:#6f8074;
}
.overlay{
  position:absolute;
  inset:0;
  background:rgba(60,80,60,.72);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:18px;
  box-sizing:border-box;
  opacity:0;
  transition:.2s;
  pointer-events:none;
}
.card:hover .overlay{opacity:1}

.menu-btn{
  position:absolute;
  top:10px;
  right:10px;
  z-index:10;
}
.menu{
  display:none;
  position:absolute;
  top:58px;
  right:10px;
  z-index:11;
  background:white;
  border-radius:20px;
  box-shadow:0 5px 15px #0002;
  overflow:hidden;
}
.menu button{
  display:block;
  width:90px;
  margin:0;
  border-radius:0;
}

.float{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:100;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.float button{
  width:52px;
  height:52px;
  border-radius:50%;
  box-shadow:0 5px 14px #0002;
}

.popup-bg{
  display:none;
  position:fixed;
  inset:0;
  background:#0008;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.popup{
  background:#f8fbf7;
  width:300px;
  padding:24px;
  border-radius:30px;
  text-align:center;
}
.popup input,.popup textarea{
  width:88%;
  background:white;
}

@media(max-width:699px){
  body{font-size:18px;padding:14px}
  .grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .card{border-radius:22px}
  .text{font-size:20px;padding:8px}
  .cat-bar{margin-top:60px}
}
</style>
</head>

<body>
<div class="top">
  <button id="loginBtn" class="icon" onclick="login()">⚙️</button>
  <button class="icon admin" onclick="logout()">✕</button>
</div>

<div class="wrap">

<div class="cat-bar" id="catBar"></div>

<div style="text-align:center">
  <button class="admin" onclick="toggle(catBox)">+ 카테고리</button>
  <button class="admin" onclick="toggle(cardBox)">+ 카드</button>
  <button class="admin" onclick="changePw()">비번 변경</button>
</div>

<div class="box" id="catBox">
  <input id="newCat" placeholder="카테고리 이름">
  <button onclick="addCat()">추가</button>
</div>

<div class="box" id="cardBox">
  <input id="name" placeholder="이름">
  <input id="img" placeholder="이미지 URL">
  <input type="file" id="file">
  <input id="link" placeholder="링크">
  <input id="desc" placeholder="설명">
  <select id="catSelect"></select>
  <button id="saveBtn" onclick="saveCard()">생성</button>
</div>

<div class="grid" id="grid"></div>
</div>

<div class="float">
  <button onclick="searchCard()">🔍</button>
  <button class="admin" onclick="backup()">📦</button>
  <button class="admin" onclick="loadData()">📂</button>
  <button class="admin" onclick="resetAll()">🧹</button>
</div>

<div class="popup-bg" id="popupBg">
  <div class="popup">
    <div id="popupText"></div>
    <textarea id="popupInput" rows="3"></textarea><br>
    <button onclick="popupOk()">확인</button>
    <button onclick="popupCancel()">취소</button>
  </div>
</div>

<script>
let user=new URLSearchParams(location.search).get("user");
if(!user){
  let n=prompt("닉네임 입력");
  if(!n)n="guest"+Math.floor(Math.random()*1000);
  location.href=location.pathname+"?user="+encodeURIComponent(n);
}

const key="cards_"+user, catKey="cats_"+user, pwKey="pw_"+user;
let cards=JSON.parse(localStorage.getItem(key)||"[]");
let cats=JSON.parse(localStorage.getItem(catKey)||'["자컾","페어","드림","자캐","그 외","없음"]');
let password=localStorage.getItem(pwKey)||"1234";
let current="all", editIndex=null, popupCallback=null;

function save(){
  localStorage.setItem(key,JSON.stringify(cards));
  localStorage.setItem(catKey,JSON.stringify(cats));
  localStorage.setItem(pwKey,password);
}

function openPopup(text,cb){
  popupText.innerText=text;
  popupInput.value="";
  popupBg.style.display="flex";
  popupCallback=cb;
  setTimeout(()=>popupInput.focus(),50);
}
function popupOk(){
  popupBg.style.display="none";
  if(popupCallback)popupCallback(popupInput.value);
}
function popupCancel(){popupBg.style.display="none"}

function login(){
  openPopup("비밀번호 입력",(v)=>{
    if(v===password)document.body.classList.add("edit");
    else alert("비밀번호가 틀렸습니다");
  });
}
function logout(){
  document.body.classList.remove("edit");
  catBox.style.display="none";
  cardBox.style.display="none";
  closeMenus();
}
function changePw(){
  openPopup("기존 비밀번호",(old)=>{
    if(old!==password){alert("기존 비밀번호가 틀렸습니다");return;}
    openPopup("새 비밀번호",(nw)=>{
      openPopup("새 비밀번호 확인",(ck)=>{
        if(nw!==ck){alert("비밀번호가 일치하지 않습니다");return;}
        password=nw; save(); alert("변경 완료");
      });
    });
  });
}
function toggle(el){
  if(!document.body.classList.contains("edit"))return;
  el.style.display=el.style.display==="block"?"none":"block";
}

function renderCat(){
  catBar.innerHTML="";
  catSelect.innerHTML="";

  let all=document.createElement("button");
  all.innerText="전체";
  all.className="cat"+(current==="all"?" active":"");
  all.onclick=()=>{current="all";renderCat();render()};
  catBar.appendChild(all);

  cats.forEach(c=>{
    let b=document.createElement("button");
    b.innerText=c;
    b.className="cat"+(current===c?" active":"");
    b.onclick=()=>{current=c;renderCat();render()};
    b.oncontextmenu=e=>{
      e.preventDefault();
      if(!document.body.classList.contains("edit"))return;
      if(confirm("정말 이 카테고리를 삭제하시겠습니까?")){
        cats=cats.filter(x=>x!==c);
        if(!cats.includes("없음"))cats.push("없음");
        cards.forEach(card=>{if(card.cat===c)card.cat="없음"});
        save();renderCat();render();
      }
    };
    catBar.appendChild(b);

    let op=document.createElement("option");
    op.value=c; op.innerText=c;
    catSelect.appendChild(op);
  });
}

function addCat(){
  let v=newCat.value.trim();
  if(!v)return;
  if(!cats.includes(v))cats.push(v);
  newCat.value="";
  save();renderCat();
}

function saveCard(){
  if(!document.body.classList.contains("edit"))return;
  let f=file.files[0];
  if(f){
    let r=new FileReader();
    r.onload=e=>pushCard(e.target.result);
    r.readAsDataURL(f);
  }else pushCard(img.value);
}

function pushCard(src){
  let obj={
    name:name.value.trim() || "이름 없음",
    img:src || "",
    link:link.value || "#",
    desc:desc.value || "",
    cat:catSelect.value || "없음",
    date: editIndex===null ? Date.now() : cards[editIndex].date
  };
  if(editIndex===null)cards.push(obj);
  else{cards[editIndex]=obj; editIndex=null; saveBtn.innerText="생성";}
  clearForm(); save(); render();
}

function clearForm(){
  name.value=""; img.value=""; link.value=""; desc.value=""; file.value="";
}

function render(list=cards){
  grid.innerHTML="";
  [...list].sort((a,b)=>b.date-a.date).forEach((c)=>{
    let realIndex=cards.indexOf(c);
    if(current!=="all"&&c.cat!==current)return;
    let d=document.createElement("div");
    d.innerHTML=`
    <div class="card">
      <a href="${c.link}">
        <img src="${c.img}">
        <div class="overlay">${c.desc}</div>
        <div class="text">${c.name}<div class="sub">${c.cat||"없음"}</div></div>
      </a>
      <button class="menu-btn admin" onclick="menu(event,${realIndex})">⋯</button>
      <div class="menu" id="m${realIndex}">
        <button onclick="editCard(event,${realIndex})">수정</button>
        <button onclick="del(event,${realIndex})">삭제</button>
      </div>
    </div>`;
    grid.appendChild(d);
  });
}

function editCard(e,i){
  e.preventDefault(); e.stopPropagation();
  let c=cards[i]; editIndex=i;
  cardBox.style.display="block";
  name.value=c.name; img.value=c.img; link.value=c.link; desc.value=c.desc; catSelect.value=c.cat;
  saveBtn.innerText="수정";
  closeMenus();
}

function del(e,i){
  e.preventDefault(); e.stopPropagation();
  if(!document.body.classList.contains("edit"))return;
  if(confirm("정말 삭제할까?")){
    cards.splice(i,1); save(); render();
  }
}

function menu(e,i){
  e.preventDefault(); e.stopPropagation();
  if(!document.body.classList.contains("edit"))return;
  closeMenus();
  document.getElementById("m"+i).style.display="block";
}
function closeMenus(){document.querySelectorAll(".menu").forEach(m=>m.style.display="none")}

function searchCard(){
  openPopup("검색어 입력",(w)=>{
    if(!w){render();return;}
    render(cards.filter(c=>(c.name+c.desc+c.cat).includes(w)));
  });
}

function backup(){
  let data=JSON.stringify({cards,cats,password});
  navigator.clipboard.writeText(data);
  alert("백업 데이터가 복사되었습니다");
}

function loadData(){
  openPopup("백업 데이터를 붙여넣기",(txt)=>{
    try{
      let d=JSON.parse(txt);
      cards=d.cards||[];
      cats=d.cats||cats;
      password=d.password||password;
      save(); renderCat(); render();
      alert("불러오기 완료");
    }catch(e){alert("데이터 형식이 이상합니다");}
  });
}

function resetAll(){
  if(confirm("정말 완전 초기화할까?")){
    localStorage.removeItem(key);
    localStorage.removeItem(catKey);
    localStorage.removeItem(pwKey);
    location.reload();
  }
}

document.addEventListener("click",closeMenus);

renderCat();
render();
</script>
</body>
</html>
</html>
